# FilmBill für TrueNAS SCALE 25.10 "Goldeye"
# 
# So nutzt du diese Datei:
# 1. In TrueNAS auf "Apps" → "Discover Apps" → "Custom App"
# 2. App Name: filmbill
# 3. Den kompletten Inhalt dieser Datei in das "Custom Compose" Feld einfügen
# 4. Werte wie POSTGRES_PASSWORD, JWT_SECRET, SMTP_USER, SMTP_PASS direkt im YAML anpassen!
#
# Datenpfade auf TrueNAS:
#   /mnt/HDDs-1/Docker/filmbill/postgres
#   /mnt/HDDs-1/Docker/filmbill/uploads
#   /mnt/HDDs-1/Docker/filmbill/init.sql

services:
  db:
    image: postgres:16-alpine
    container_name: filmbill_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: filmbill
      POSTGRES_USER: filmbill
      POSTGRES_PASSWORD: AENDERN_StarkesPasswort123
    volumes:
      - /mnt/HDDs-1/Docker/filmbill/postgres:/var/lib/postgresql/data
      - /mnt/HDDs-1/Docker/filmbill/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filmbill"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - filmbill_net

  backend:
    image: oddoneeu/filmbill-backend:latest
    container_name: filmbill_api
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://filmbill:AENDERN_StarkesPasswort123@db:5432/filmbill
      JWT_SECRET: AENDERN_LangerZufaelligerStringMit32PlusZeichen
      SMTP_HOST: smtp.office365.com
      SMTP_PORT: "587"
      SMTP_USER: office@yon.studio
      SMTP_PASS: DEIN_M365_PASSWORT
      SMTP_FROM: office@yon.studio
      APP_URL: https://filmbills.yon.studio
      COMPANY_NAME: 257 Studio OG
    volumes:
      - /mnt/HDDs-1/Docker/filmbill/uploads:/app/uploads
    networks:
      - filmbill_net

  frontend:
    image: oddoneeu/filmbill-frontend:latest
    container_name: filmbill_ui
    restart: unless-stopped
    pull_policy: always
    depends_on:
      - backend
    networks:
      - filmbill_net

  nginx:
    image: nginx:alpine
    container_name: filmbill_proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - /mnt/HDDs-1/Docker/filmbill/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - filmbill_net

networks:
  filmbill_net:
    driver: bridge
