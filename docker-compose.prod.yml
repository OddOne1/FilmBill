# Production docker-compose: lädt Images von Docker Hub statt selbst zu bauen.
# Verwendung:  docker compose -f docker-compose.prod.yml up -d
#
# Setze DOCKERHUB_USER in .env auf deinen Docker Hub Username

services:
  db:
    image: postgres:16-alpine
    container_name: filmbill_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filmbill}
      POSTGRES_USER: ${POSTGRES_USER:-filmbill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filmbill}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USER:?DOCKERHUB_USER required}/filmbill-backend:latest
    container_name: filmbill_api
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-filmbill}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-filmbill}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?SMTP_USER required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS required}
      SMTP_FROM: ${SMTP_FROM:-${SMTP_USER}}
      APP_URL: ${APP_URL:-http://localhost}
      COMPANY_NAME: ${COMPANY_NAME:-FilmBill}
    volumes:
      - ./data/uploads:/app/uploads

  frontend:
    image: ${DOCKERHUB_USER}/filmbill-frontend:latest
    container_name: filmbill_ui
    restart: unless-stopped
    pull_policy: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: filmbill_proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
