version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: filmbill_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filmbill}
      POSTGRES_USER: ${POSTGRES_USER:-filmbill}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filmbill}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: filmbill_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-filmbill}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-filmbill}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      # Microsoft 365 SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-http://192.168.1.100:8080}
      COMPANY_NAME: ${COMPANY_NAME:-FilmBill}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-}
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: filmbill_ui
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: filmbill_proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:

