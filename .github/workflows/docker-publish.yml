name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:  # manueller Start möglich

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmbill-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmbill-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/filmbill-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/filmbill-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
